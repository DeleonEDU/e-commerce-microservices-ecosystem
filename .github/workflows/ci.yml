name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: cd frontend && npm ci
      - name: Lint
        run: cd frontend && npm run lint
      - name: Build frontend
        run: cd frontend && npm run build

  test-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth_service, product_service, order_service, payment_service, rating_service]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/${{ matrix.service }}/requirements.txt
        pip install pytest pytest-cov pytest-mock pytest-django httpx-mock flake8
        
    - name: Lint with flake8
      run: |
        flake8 services/${{ matrix.service }} --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 services/${{ matrix.service }} --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Test with pytest and generate coverage
      run: |
        export PYTHONPATH=services/${{ matrix.service }}
        cd services/${{ matrix.service }}
        if [ "${{ matrix.service }}" = "auth_service" ]; then
          pytest users/tests.py tests/ --cov=. --cov-report=xml --cov-report=html --cov-fail-under=70
        elif [ "${{ matrix.service }}" = "product_service" ]; then
          pytest catalog/tests.py tests/ --cov=. --cov-report=xml --cov-report=html --cov-fail-under=70
        elif [ -d "tests" ]; then
          pytest tests/ --cov=. --cov-report=xml --cov-report=html --cov-fail-under=70
        else
          echo "No tests directory for ${{ matrix.service }}"
          exit 1
        fi
        
    - name: Upload HTML/XML reports as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.service }}
        path: |
          services/${{ matrix.service }}/coverage.xml
          services/${{ matrix.service }}/htmlcov/
        retention-days: 7

  sonarcloud:
    needs: [test-services]
    if: ${{ secrets.SONAR_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          path: coverage-reports
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=DeleonEDU_e-commerce-microservices-ecosystem
            -Dsonar.organization=DeleonEDU
            -Dsonar.python.coverage.reportPaths=coverage-reports/**/coverage.xml
            -Dsonar.sources=services/
            -Dsonar.tests=services/
            -Dsonar.test.inclusions=**/tests/**

  docker-build-all:
    needs: [build-frontend, test-services]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create dummy .env
        run: cp .env.example .env || touch .env
      - name: Build all Docker images
        run: docker compose build
