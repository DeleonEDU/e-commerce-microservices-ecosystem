name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build frontend
        run: npm run build

  test-order-service:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/order_service/requirements.txt
        pip install pytest pytest-cov flake8
    - name: Lint with flake8
      run: |
        flake8 services/order_service --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 services/order_service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        export PYTHONPATH=services/order_service
        pytest services/order_service/tests/ --cov=services/order_service --cov-report=xml

  test-auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/auth_service/requirements.txt
          pip install flake8
      - name: Lint with flake8
        run: |
          flake8 services/auth_service --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/auth_service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Run Django Tests
        run: |
          cd services/auth_service
          python manage.py test

  test-product-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/product_service/requirements.txt
          pip install flake8
      - name: Lint with flake8
        run: |
          flake8 services/product_service --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/product_service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Run Django Tests
        run: |
          cd services/product_service
          python manage.py test

  test-payment-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/payment_service/requirements.txt
          pip install flake8 pytest
      - name: Lint with flake8
        run: |
          flake8 services/payment_service --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/payment_service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Run Tests
        run: |
          export PYTHONPATH=services/payment_service
          if [ -d "services/payment_service/tests" ]; then
            pytest services/payment_service/tests/
          else
            echo "No tests found for payment_service"
          fi

  test-rating-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/rating_service/requirements.txt
          pip install flake8 pytest
      - name: Lint with flake8
        run: |
          flake8 services/rating_service --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/rating_service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Run Tests
        run: |
          export PYTHONPATH=services/rating_service
          if [ -d "services/rating_service/tests" ]; then
            pytest services/rating_service/tests/
          else
            echo "No tests found for rating_service"
          fi

  docker-build-all:
    needs: [build-frontend, test-order-service, test-auth-service, test-product-service, test-payment-service, test-rating-service]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create dummy .env
        run: cp .env.example .env || touch .env
      - name: Build all Docker images
        run: docker compose build
