name: CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test-order-service:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r services/order_service/requirements.txt
        pip install pytest pytest-cov flake8
    - name: Lint with flake8
      run: |
        # зупиняємо збірку, якщо є синтаксичні помилки або невизначені імена
        flake8 services/order_service --count --select=E9,F63,F7,F82 --show-source --statistics
        # попередження
        flake8 services/order_service --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      run: |
        export PYTHONPATH=services/order_service
        pytest services/order_service/tests/ --cov=services/order_service --cov-report=xml
