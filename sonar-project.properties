# SonarCloud — projectKey / organization мають збігатися з проєктом у sonarcloud.io
sonar.projectKey=DeleonEDU_e-commerce-microservices-ecosystem
sonar.organization=deleonedu

sonar.sources=services
sonar.tests=services
sonar.test.inclusions=**/tests/**,**/catalog/tests.py,**/users/tests.py

sonar.exclusions=**/venv/**,**/.venv/**,**/node_modules/**,**/htmlcov/**,**/migrations/**,**/dist/**

sonar.python.version=3.10
# Populated by CI after actions/download-artifact (see .github/workflows/ci.yml sonarcloud job).
sonar.python.coverage.reportPaths=coverage-reports/**/coverage.xml
